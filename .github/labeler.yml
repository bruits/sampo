# Configuration for automatic PR labeling
# See: https://github.com/actions/labeler

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

devops:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - ".vscode/**"
          - ".zed/**"
          - ".editorconfig"
          - ".gitignore"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "**/Cargo.toml"
          - "**/Cargo.lock"

"crt:sampo":
  - changed-files:
      - any-glob-to-any-file:
          - "crates/sampo/**"

"crt:sampo-core":
  - changed-files:
      - any-glob-to-any-file:
          - "crates/sampo-core/**"

"crt:sampo-github-action":
  - changed-files:
      - any-glob-to-any-file:
          - "crates/sampo-github-action/**"

"crt:sampo-github-bot":
  - changed-files:
      - any-glob-to-any-file:
          - "crates/sampo-github-bot/**"
