version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-patch:
        patterns: ["*"]
        update-types: ["patch"]
      cargo-minor:
        patterns: ["*"]
        update-types: ["minor"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
